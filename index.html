<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 Antigravity Kids Jigsaw Puzzle</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Sidebar Controls -->
        <aside id="controls-panel">
            <div class="panel-header">
                <h1>🧩 Kids Puzzle</h1>
            </div>
            
            <div class="control-group">
                <label for="pieces-slider">Pieces: <span id="pieces-count-display">24</span></label>
                <input type="range" id="pieces-slider" min="20" max="200" value="24" step="4">
            </div>

            <div class="control-group">
                <label for="image-select">Select Picture</label>
                <div class="select-wrapper">
                    <select id="image-select">
                        <option value="dino.png" selected>🦕 Dino</option>
                        <option value="space.png">🚀 Space</option>
                        <option value="ocean.png">🐳 Ocean</option>
                        <option value="unicorns.png">🦄 Magic</option>
                        <option value="candy.png">🍬 Candy</option>
                        <option value="fairy.png">🍄 Fairy</option>
                        <option value="zot.png">🐜 Zot</option>
                        <option value="dragons.png">🐲 Dragons</option>
                        <option value="tree.png">🌈 Tree</option>
                        <option value="baby_dinos.png">🦖 Baby Dinos</option>
                    </select>
                </div>
                
                <div class="custom-photo-row">
                    <label class="custom-file-upload">
                        <input type="file" id="image-loader" accept="image/*">
                        📁 Custom Photo
                    </label>
                    <button id="toggle-guide" class="btn-icon active" title="Toggle Guide Image">👻</button>
                    <button id="toggle-rotation" class="btn-icon active" title="Toggle Rotate Mode">🔄</button>
                </div>
            </div>

            <button id="btn-start" class="btn-primary">🎮 Start Puzzle</button>

            <!-- Stats -->
            <div class="control-group stats-group">
                <div class="stat-item">⏱️ Time: <span id="timer-display">00:00</span></div>
            </div>

            <button id="btn-scores" class="btn-secondary" style="margin-top: 15px; width: 100%;">🏆 View Best Times</button>
            
            <!-- Zoom & Pan Helper for iPads -->
            <div id="zoom-safe-zone" style="margin-top: 15px;">
                🔍 Pinch here to Zoom Out
            </div>
        </aside>

        <!-- Main Workspace -->
        <main id="workspace">
            <!-- Play Board -->
            <div id="board-container">
                <div id="puzzle-board">
                    <div id="board-ghost"></div>
                    <div id="board-grid-overlay"></div>
                </div>
            </div>

            <!-- Zoom & Pan Helper right under the board -->
            <div id="board-zoom-safe-zone">
                🔍 Pinch here to Zoom Out
            </div>

            <!-- Scattered pieces will be dynamically appended here in #pieces-layer -->
            <div id="pieces-layer"></div>
        </main>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-modal" class="hidden">
        <div class="modal-content">
            <span class="confetti-emoji">🎉</span>
            <h2>Super Job!</h2>
            <p>You completed the puzzle in <strong id="victory-time">00:00</strong>!</p>
            
            <!-- Victory Leaderboard -->
            <div class="victory-leaderboard">
                <h3>🏆 Top Times</h3>
                <div id="victory-best-times-list"></div>
            </div>
            
            <button id="btn-play-again" class="btn-primary">Play Again 🔄</button>
        </div>
    </div>

    <!-- Best Times Modal -->
    <div id="scores-modal" class="hidden">
        <div class="modal-content">
            <span id="close-scores" class="close-btn">×</span>
            <h2>🏆 Best Times</h2>
            <div id="best-times-list-modal">
                <div class="no-scores">No scores yet!</div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
